tilesetDescriptionTitle=Bei der Bereitstellung als Tiles werden die Daten in rõumliche Kacheln portioniert, wobei die Gr÷▀e der Kacheln vom Ma▀stab / der Zoomstufe abhõngt. Die rõumliche Organisation wird durch das Kachelschema (engl. <a href="https://www.ogc.org/standards/tms" target="_blank">Tile Matrix Set</a>) festgelegt.
howToUseTitle=Die von dieser API gemõ▀ <a href="https://ogcapi.ogc.org/tiles/" target="_blank">OGC API Tiles</a> bereitgestellten Kacheln im gõngigen Kachelschema "WebMercatorQuad" k÷nnen auch in Anwendungen genutzt werden, die die OGC-API-Spezifikation nicht direkt unterst³tzen, sofern sie eine der folgenden Optionen unterst³tzen: <ul><li>In vielen Anwendungen k÷nnen Kachelsõtze ³ber ein URL-Template nach dem sogenannten 'xyz'-Schema eingebunden werden, wobei '{z}' die Zoomstufe und '{y}' bzw. '{x}' die Zeile bzw. Spalte im Kachelraster der Zoomstufe bezeichnen. Kopieren Sie dazu das URL-Template und verwenden Sie dieses in der Anwendung.</li><li><a href="https://github.com/mapbox/tilejson-spec" target="_blank">TileJSON</a> ist ein gõngiges Format zur Beschreibung von Kachelsõtzen, das neben dem URL-Template weitere Metadaten zum Kachelsatz enthõlt. Sofern Anwendungen TileJSON unterst³tzen, kopieren Sie die TileJSON-URL und verwenden Sie diese in der Anwendung.</li></ul><br/> 
