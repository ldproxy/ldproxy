returnables_and_receivablesDescription=Das Schema der Objektart beschreibt die "Returnables" und "Receivables". Returnables sind Objekteigenschaften, die bei Abfragen zur\u00FCckgegeben werden. Receivables sind Objekteigenschaften, die vom Nutzer bei \u00C4nderungen am Objekt (Erstellen, Ersetzen oder Aktualisieren) bereitgestellt werden m\u00FCssen oder k\u00F6nnen. Falls nicht anders angegeben, ist eine Eigenschaft sowohl ein Returnable als auch ein Receivable.
