tilesetDescriptionTitle=Bei der Bereitstellung als Tiles werden die Daten in r\u00E4umliche Kacheln portioniert, wobei die Gr\u00F6\u00DFe der Kacheln vom Ma\u00DFstab / der Zoomstufe abh\u00E4ngt. Die r\u00E4umliche Organisation wird durch das Kachelschema (engl. <a href="https://www.ogc.org/standards/tms" target="_blank">Tile Matrix Set</a>) festgelegt.
howToUseTitle=Die von dieser API gem\u00E4\u00DF <a href="https://ogcapi.ogc.org/tiles/" target="_blank">OGC API Tiles</a> bereitgestellten Kacheln im g\u00E4ngigen Kachelschema "WebMercatorQuad" k\u00F6nnen auch in Anwendungen genutzt werden, die die OGC-API-Spezifikation nicht direkt unterst\u00FCtzen, sofern sie eine der folgenden Optionen unterst\u00FCtzen: <ul><li>In vielen Anwendungen k\u00F6nnen Kachels\u00E4tze \u00FCber ein URL-Template nach dem sogenannten 'xyz'-Schema eingebunden werden, wobei '{z}' die Zoomstufe und '{y}' bzw. '{x}' die Zeile bzw. Spalte im Kachelraster der Zoomstufe bezeichnen. Kopieren Sie dazu das URL-Template und verwenden Sie dieses in der Anwendung.</li><li><a href="https://github.com/mapbox/tilejson-spec" target="_blank">TileJSON</a> ist ein g\u00E4ngiges Format zur Beschreibung von Kachels\u00E4tzen, das neben dem URL-Template weitere Metadaten zum Kachelsatz enth\u00E4lt. Sofern Anwendungen TileJSON unterst\u00FCtzen, kopieren Sie die TileJSON-URL und verwenden Sie diese in der Anwendung.</li></ul><br/> 
