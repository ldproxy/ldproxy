
depends_on:
  - release

when:
  event: [ tag ]

steps:

  dtrack:
    image: eclipse-temurin:25@sha256:68868d04fa9cfd5f5c6abec0b5cef86d8de2bf9c62c37c7d3e4f0f80f5cfd7ff
    commands:
      - ./gradlew publishSbom -Prelease=true -PdtrackApiUrl=https://dtrack.ldproxy.net/api/v1/bom -PdtrackApiKey=$DTRACK_API_KEY
    secrets: [ dtrack_api_key ]

  github:
    image: meltwaterfoundation/github-cli:2.37.0@sha256:9b0e59b7a9b92188376121abce74604f70b9942f79ff4badf776910121f4519c
    commands:
      - gh release upload $CI_COMMIT_TAG "build/reports/sbom.json#CycloneDX SBOM"
    secrets: [ github_token ]

