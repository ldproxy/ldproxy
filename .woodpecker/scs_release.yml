
depends_on:
  - release

when:
  event: [ tag ]

steps:

  dtrack:
    image: eclipse-temurin:17@sha256:859dc576f4af4fad89a179441e3f6dc9a549b86a2ffa5c740ed76b644810239b
    commands:
      - ./gradlew publishSbom -Prelease=true -PdtrackApiUrl=https://dtrack.ldproxy.net/api/v1/bom -PdtrackApiKey=$DTRACK_API_KEY
    secrets: [ dtrack_api_key ]

  github:
    image: meltwaterfoundation/github-cli:2.29.0@sha256:43af6d8e8acef449a16c30c06cf662132630535a76efcab9f4e92ca2b8ef55a4
    commands:
      - gh release upload $CI_COMMIT_TAG "build/reports/sbom.json#CycloneDX SBOM"
    secrets: [ github_token ]

